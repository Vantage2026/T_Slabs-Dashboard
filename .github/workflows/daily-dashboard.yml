name: Boss daily tracking dashboard

on:
  schedule:
    # Every hour UTC; gate keeps only 8 AM America/New_York
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run now (ignore 8 AM Eastern gate)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: boss-dashboard-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        working-directory: boss-dashboard-daily
        run: npm ci

      - name: Gate — 8 AM Eastern or manual force
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Gate: forced run"
            exit 0
          fi
          H=$(TZ=America/New_York date +%H)
          echo "hour_ny=$H" >> "$GITHUB_OUTPUT"
          if [ "$H" != "08" ]; then
            echo "Not 8 AM America/New_York — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # WIF: no JSON key. See https://cloud.google.com/iam/docs/workload-identity-federation-with-deployment-pipelines
      #
      # Secret GOOGLE_WORKLOAD_IDENTITY_PROVIDER must be the FULL provider resource name (STS audience), e.g.
      #   projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID
      # Not: pool name only, numeric ID only, or a URL. Copy from GCP → IAM → Workload Identity Federation → pool → provider.
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        if: steps.gate.outputs.skip == 'false'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true
          # Default true: writes GOOGLE_APPLICATION_CREDENTIALS (+ GOOGLE_GHA_CREDS_PATH) to GITHUB_ENV for later steps.
          export_environment_variables: true

      - name: Run dashboard + email / SMS
        if: steps.gate.outputs.skip == 'false'
        working-directory: boss-dashboard-daily
        env:
          # Do not set GOOGLE_APPLICATION_CREDENTIALS here — if steps.auth.outputs.credentials_file_path were empty,
          # it would override the auth action's GITHUB_ENV and break ADC. See boss-dashboard-daily/src/sheets.js (GHA paths).
          # Set secret SKIP_FEDEX_API=1 to use sheet + public fedex.com links only (no FedEx developer API).
          SKIP_FEDEX_API: ${{ secrets.SKIP_FEDEX_API }}
          FEDEX_API_KEY: ${{ secrets.FEDEX_API_KEY }}
          FEDEX_SECRET_KEY: ${{ secrets.FEDEX_SECRET_KEY }}
          FEDEX_USE_SANDBOX: ${{ secrets.FEDEX_USE_SANDBOX }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_E164: ${{ secrets.TWILIO_FROM_E164 }}
          BOSS_PHONE_E164: ${{ secrets.BOSS_PHONE_E164 }}
          SMS_INTRO: ${{ secrets.SMS_INTRO }}
          # Optional free notifications via SMTP (e.g. Gmail app password). Omit Twilio secrets to use email only.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
          SHEET_KAI_ID: ${{ secrets.SHEET_KAI_ID }}
          SHEET_KAI_GID: ${{ secrets.SHEET_KAI_GID }}
          SHEET_MOMO_ID: ${{ secrets.SHEET_MOMO_ID }}
          SHEET_MOMO_GID: ${{ secrets.SHEET_MOMO_GID }}
          # Public URL after deploy (GitHub Pages project site). Override with secret if you use a custom domain.
          DASHBOARD_PUBLIC_URL: ${{ secrets.DASHBOARD_PUBLIC_URL }}
        run: |
          if [ -z "${DASHBOARD_PUBLIC_URL:-}" ]; then
            export DASHBOARD_PUBLIC_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/report.html"
          fi
          npm start

      - name: Upload Pages artifact
        if: steps.gate.outputs.skip == 'false'
        uses: actions/upload-pages-artifact@v3
        with:
          path: boss-dashboard-daily/dist

      - name: Upload report artifact
        if: steps.gate.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: boss-dashboard-daily/dist/report.html

  deploy:
    needs: build
    if: needs.build.outputs.skip == 'false'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
